name: Build CMake for ETL
description: Print tool versions and build with cmake --build for bash-based Linux/macOS workflows.

inputs:
  compiler-version-command:
    description: Compiler executable to query version from (for example gcc or clang-17).
    required: true
  asan-options:
    description: Optional ASAN_OPTIONS value to export for build-time tooling.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Build
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${{ inputs.asan-options }}" ]; then
          export ASAN_OPTIONS="${{ inputs.asan-options }}"
        fi
        cmake --version
        ${{ inputs.compiler-version-command }} --version
        cmake --build . --parallel 2
