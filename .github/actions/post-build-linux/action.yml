name: Post Build Checks (Linux)
description: Run tests, upload failure artifacts, and print ccache stats.

inputs:
  test-command:
    description: Test command to execute.
    required: true
  artifact-name:
    description: Artifact name for failure uploads.
    required: true
  artifact-path:
    description: Artifact paths to upload on failure.
    required: true
  retention-days:
    description: Artifact retention in days.
    required: false
    default: "14"

runs:
  using: composite
  steps:
    - name: Run tests
      shell: bash
      run: |
        set -euo pipefail
        ${{ inputs.test-command }}

    - name: Upload failure artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.artifact-path }}
        if-no-files-found: ignore
        retention-days: ${{ inputs.retention-days }}

    - name: Print ccache statistics
      shell: bash
      run: ccache -s
