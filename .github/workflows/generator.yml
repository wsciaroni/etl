name: generator checks
on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, pull-request/* ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generator-run:
    name: Header Generator
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install cogapp
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install cogapp==3.3.0

    - name: Generate
      run: |
        set -euo pipefail
        cd include/etl/generators && bash generate.bat

    - name: Check Generated Headers For Changes
      run: |
        set -euo pipefail
        if ! git diff --exit-code; then
          echo "::error::Generated headers are stale. Run include/etl/generators/generate.bat and commit regenerated headers."
          git diff --name-only
          exit 1
        fi
