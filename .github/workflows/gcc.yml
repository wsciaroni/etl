name: gcc

on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: GCC C++${{ matrix.cxx_standard }} Linux - ${{ matrix.no_stl == 'ON' && 'No STL' || 'STL' }}${{ matrix.force_cpp03 == 'ON' && ' - Force C++03' || '' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        cxx_standard: [11, 14, 17]
        no_stl: ['ON', 'OFF']
        include:
          # Set force_cpp03 default for the C++11/14/17 base combinations
          - force_cpp03: 'OFF'
          # C++20 combinations
          - cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'OFF'
          - cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'OFF'
          - cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'ON'
          - cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'ON'
          # C++23 combinations
          - cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'OFF'
          - cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'OFF'
          - cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'ON'
          - cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'ON'

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup ccache
      uses: ./.github/actions/setup-ccache
      with:
        key-suffix: cpp${{ matrix.cxx_standard }}-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}

    - name: Configure CMake
      uses: ./.github/actions/configure-cmake-etl
      env:
        CC: gcc
        CXX: g++
      with:
        source-dir: ./
        build-tests-flag: -DBUILD_TESTS=ON
        no-stl: ${{ matrix.no_stl }}
        force-cpp03: ${{ matrix.force_cpp03 }}
        cxx-standard: ${{ matrix.cxx_standard }}


    - name: Build
      uses: ./.github/actions/build-cmake-etl
      with:
        compiler-version-command: gcc
        # Leak detection remains disabled in CI until historical sanitizer noise is addressed.
        asan-options: alloc_dealloc_mismatch=0,detect_leaks=0

    - name: Post build checks
      uses: ./.github/actions/post-build-linux
      with:
        test-command: ./test/etl_tests -v
        artifact-name: gcc-failure-cpp${{ matrix.cxx_standard }}-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}
        artifact-path: |
          ./test/etl_tests
          ./CMakeCache.txt
          ./Testing/Temporary/LastTest.log

