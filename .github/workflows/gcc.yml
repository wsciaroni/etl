name: gcc

on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: GCC C++${{ matrix.cxx_standard }} Linux - ${{ matrix.no_stl == 'ON' && 'No STL' || 'STL' }}${{ matrix.force_cpp03 == 'ON' && ' - Force C++03' || '' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        cxx_standard: [11, 14, 17]
        no_stl: ['ON', 'OFF']
        include:
          # Set force_cpp03 default for the C++11/14/17 base combinations
          - force_cpp03: 'OFF'
          # C++20 combinations
          - cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'OFF'
          - cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'OFF'
          - cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'ON'
          - cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'ON'
          # C++23 combinations
          - cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'OFF'
          - cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'OFF'
          - cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'ON'
          - cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'ON'

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup ccache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-${{ github.workflow }}-${{ github.job }}-cpp${{ matrix.cxx_standard }}-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}-${{ hashFiles('CMakeLists.txt', 'test/CMakeLists.txt') }}

    - name: Build
      run: |
        # Leak detection remains disabled in CI until historical sanitizer noise is addressed.
        export ASAN_OPTIONS=alloc_dealloc_mismatch=0,detect_leaks=0
        export CC=gcc
        export CXX=g++
        cmake --version
        gcc --version
        cmake -DBUILD_TESTS=ON -DNO_STL=${{ matrix.no_stl }} -DETL_USE_TYPE_TRAITS_BUILTINS=OFF -DETL_USER_DEFINED_TYPE_TRAITS=OFF -DETL_FORCE_TEST_CPP03_IMPLEMENTATION=${{ matrix.force_cpp03 }} -DETL_CXX_STANDARD=${{ matrix.cxx_standard }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ./
        make -j $(getconf _NPROCESSORS_ONLN)

    - name: Run tests
      run: ./test/etl_tests -v

    - name: Upload failure artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: gcc-failure-cpp${{ matrix.cxx_standard }}-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}
        path: |
          ./test/etl_tests
          ./CMakeCache.txt
          ./Testing/Temporary/LastTest.log
        if-no-files-found: ignore
        retention-days: 14

    - name: Print ccache statistics
      run: ccache -s
