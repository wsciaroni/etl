name: gcc

on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: GCC C++${{ matrix.cxx_standard }} Linux - ${{ matrix.no_stl == 'ON' && 'No STL' || 'STL' }}${{ matrix.force_cpp03 == 'ON' && ' - Force C++03' || '' }}
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        cxx_standard: [11, 14, 17]
        no_stl: ['ON', 'OFF']
        include:
          # Set force_cpp03 default for the C++11/14/17 base combinations
          - force_cpp03: 'OFF'
          # C++20 combinations
          - cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'OFF'
          - cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'OFF'
          - cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'ON'
          - cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'ON'
          # C++23 combinations
          - cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'OFF'
          - cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'OFF'
          - cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'ON'
          - cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'ON'

    steps:
    - uses: actions/checkout@v4

    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ matrix.cxx_standard }}-${{ matrix.no_stl }}-${{ matrix.force_cpp03 }}

    - name: Build
      run: |
        export ASAN_OPTIONS=alloc_dealloc_mismatch=0,detect_leaks=0
        export CC=gcc
        export CXX=g++
        cmake -DBUILD_TESTS=ON -DNO_STL=${{ matrix.no_stl }} -DETL_USE_TYPE_TRAITS_BUILTINS=OFF -DETL_USER_DEFINED_TYPE_TRAITS=OFF -DETL_FORCE_TEST_CPP03_IMPLEMENTATION=${{ matrix.force_cpp03 }} -DETL_CXX_STANDARD=${{ matrix.cxx_standard }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ./
        gcc --version
        make -j $(getconf _NPROCESSORS_ONLN)

    - name: Run tests
      run: ./test/etl_tests -v
