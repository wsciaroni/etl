name: syntax checks

on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: Syntax Check - ${{ matrix.cc == 'gcc' && 'GCC' || 'Clang' }} C++${{ matrix.cxx_standard }} Linux ${{ matrix.no_stl == 'ON' && 'No STL' || 'STL' }}${{ matrix.force_cpp03 == 'ON' && ' Force C++03' || '' }}
    runs-on: ubuntu-22.04

    strategy:
      matrix:
        cc: [gcc, clang]
        cxx_standard: ['03', '11', '14', '17', '20', '23']
        no_stl: ['ON', 'OFF']
        force_cpp03: ['OFF', 'ON']
        include:
          - cc: gcc
            cxx: g++
          - cc: clang
            cxx: clang++
        exclude:
          - cxx_standard: '03'
            force_cpp03: 'ON'

    steps:
    - uses: actions/checkout@v4

    - uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ github.job }}-${{ matrix.cc }}-${{ matrix.cxx_standard }}-${{ matrix.no_stl }}-${{ matrix.force_cpp03 }}

    - name: Build
      run: |
        export CC=${{ matrix.cc }}
        export CXX=${{ matrix.cxx }}
        cmake -DNO_STL=${{ matrix.no_stl }} -DETL_USE_TYPE_TRAITS_BUILTINS=OFF -DETL_USER_DEFINED_TYPE_TRAITS=OFF -DETL_FORCE_TEST_CPP03_IMPLEMENTATION=${{ matrix.force_cpp03 }} -DETL_CXX_STANDARD=${{ matrix.cxx_standard }} -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache ./test/syntax_check
        ${{ matrix.cc }} --version
        make -j $(getconf _NPROCESSORS_ONLN)
