name: syntax checks

on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build:
    name: Syntax Check - ${{ matrix.cc == 'gcc' && 'GCC' || 'Clang' }} C++${{ matrix.cxx_standard }} Linux ${{ matrix.no_stl == 'ON' && 'No STL' || 'STL' }}${{ matrix.force_cpp03 == 'ON' && ' Force C++03' || '' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
        cxx_standard: ['03', '11', '14', '17', '20', '23']
        no_stl: ['ON', 'OFF']
        force_cpp03: ['OFF', 'ON']
        include:
          - cc: gcc
            cxx: g++
          - cc: clang
            cxx: clang++
        exclude:
          - cxx_standard: '03'
            force_cpp03: 'ON'

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup ccache
      uses: ./.github/actions/setup-ccache
      with:
        key-suffix: ${{ matrix.cc }}-cpp${{ matrix.cxx_standard }}-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}

    - name: Configure CMake
      uses: ./.github/actions/configure-cmake-etl
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      with:
        source-dir: ./test/syntax_check
        no-stl: ${{ matrix.no_stl }}
        force-cpp03: ${{ matrix.force_cpp03 }}
        cxx-standard: ${{ matrix.cxx_standard }}

    - name: Build
      uses: ./.github/actions/build-cmake-etl
      with:
        compiler-version-command: ${{ matrix.cc }}
