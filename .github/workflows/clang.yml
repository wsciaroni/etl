name: clang

on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Clang C++${{ matrix.cxx_standard }} ${{ matrix.os_name }} - ${{ matrix.no_stl == 'ON' && 'No STL' || 'STL' }}${{ matrix.force_cpp03 == 'ON' && ' - Force C++03' || '' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        cxx_standard: [11, 14, 17]
        no_stl: ['ON', 'OFF']
        include:
          # Default values for the base Linux C++11/14/17 combinations
          - os: ubuntu-22.04
            os_name: Linux
            cc: clang
            cxx: clang++
            needs_newer_clang: false
            force_cpp03: 'OFF'
          # Linux C++20 (requires newer Clang; STL-only is covered by the macOS builds)
          - os: ubuntu-22.04
            os_name: Linux
            cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'OFF'
            cc: clang-17
            cxx: clang++-17
            needs_newer_clang: true
          - os: ubuntu-22.04
            os_name: Linux
            cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'ON'
            cc: clang-17
            cxx: clang++-17
            needs_newer_clang: true
          - os: ubuntu-22.04
            os_name: Linux
            cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'ON'
            cc: clang-17
            cxx: clang++-17
            needs_newer_clang: true
          # Linux C++23 (requires newer Clang; STL-only is covered by the macOS builds)
          - os: ubuntu-22.04
            os_name: Linux
            cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'OFF'
            cc: clang-17
            cxx: clang++-17
            needs_newer_clang: true
          - os: ubuntu-22.04
            os_name: Linux
            cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'ON'
            cc: clang-17
            cxx: clang++-17
            needs_newer_clang: true
          - os: ubuntu-22.04
            os_name: Linux
            cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'ON'
            cc: clang-17
            cxx: clang++-17
            needs_newer_clang: true
          # macOS C++20
          - os: macos-15
            os_name: OSX
            cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'OFF'
            cc: clang
            cxx: clang++
            needs_newer_clang: false
          - os: macos-15
            os_name: OSX
            cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'OFF'
            cc: clang
            cxx: clang++
            needs_newer_clang: false
          - os: macos-15
            os_name: OSX
            cxx_standard: 20
            no_stl: 'OFF'
            force_cpp03: 'ON'
            cc: clang
            cxx: clang++
            needs_newer_clang: false
          - os: macos-15
            os_name: OSX
            cxx_standard: 20
            no_stl: 'ON'
            force_cpp03: 'ON'
            cc: clang
            cxx: clang++
            needs_newer_clang: false
          # macOS C++23
          - os: macos-15
            os_name: OSX
            cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'OFF'
            cc: clang
            cxx: clang++
            needs_newer_clang: false
          - os: macos-15
            os_name: OSX
            cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'OFF'
            cc: clang
            cxx: clang++
            needs_newer_clang: false
          - os: macos-15
            os_name: OSX
            cxx_standard: 23
            no_stl: 'OFF'
            force_cpp03: 'ON'
            cc: clang
            cxx: clang++
            needs_newer_clang: false
          - os: macos-15
            os_name: OSX
            cxx_standard: 23
            no_stl: 'ON'
            force_cpp03: 'ON'
            cc: clang
            cxx: clang++
            needs_newer_clang: false

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup ccache
      uses: ./.github/actions/setup-ccache
      with:
        key-suffix: ${{ matrix.os_name }}-cpp${{ matrix.cxx_standard }}-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}


    # Temporary fix for Ubuntu runner. See https://github.com/actions/runner-images/issues/8659
    - name: Install newer Clang
      if: matrix.needs_newer_clang
      run: |
        set -euo pipefail
        sudo mkdir -p /etc/apt/keyrings
        curl -fsSL --retry 5 --retry-delay 2 --retry-connrefused https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor | sudo tee /etc/apt/keyrings/llvm-archive-keyring.gpg >/dev/null
        . /etc/os-release
        echo "deb [signed-by=/etc/apt/keyrings/llvm-archive-keyring.gpg] https://apt.llvm.org/${VERSION_CODENAME}/ llvm-toolchain-${VERSION_CODENAME}-17 main" | sudo tee /etc/apt/sources.list.d/llvm.list >/dev/null
        sudo apt-get update
        sudo apt-get install -y clang-17

    - name: Configure CMake
      uses: ./.github/actions/configure-cmake-etl
      env:
        CC: ${{ matrix.cc }}
        CXX: ${{ matrix.cxx }}
      with:
        source-dir: ./
        build-tests-flag: -DBUILD_TESTS=ON
        no-stl: ${{ matrix.no_stl }}
        force-cpp03: ${{ matrix.force_cpp03 }}
        cxx-standard: ${{ matrix.cxx_standard }}

    - name: Build
      uses: ./.github/actions/build-cmake-etl
      with:
        compiler-version-command: ${{ matrix.cc }}
        # Leak detection remains disabled in CI until historical sanitizer noise is addressed.
        asan-options: alloc_dealloc_mismatch=0,detect_leaks=0

    - name: Post build checks
      uses: ./.github/actions/post-build-linux
      with:
        test-command: ./test/etl_tests -v
        artifact-name: clang-failure-${{ matrix.os_name }}-cpp${{ matrix.cxx_standard }}-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}
        artifact-path: |
          ./test/etl_tests
          ./CMakeCache.txt
          ./Testing/Temporary/LastTest.log

