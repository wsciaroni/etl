name: msvc
on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

jobs:
  build-windows:
    name: Windows (NO_STL=${{ matrix.no_stl }}, CPP03=${{ matrix.force_cpp03 }})
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        no_stl: ['OFF', 'ON']
        force_cpp03: ['OFF', 'ON']

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup MSBuildCache
      uses: actions/cache@v5
      with:
        path: .msbuildcache
        # The key dynamically includes the matrix variables to prevent cross-job cache poisoning
        key: ${{ runner.os }}-msbuild-nostl-${{ matrix.no_stl }}-cpp03-${{ matrix.force_cpp03 }}-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-msbuild-nostl-${{ matrix.no_stl }}-cpp03-${{ matrix.force_cpp03 }}-

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v1.0.2

    - name: Configure and Build
      run: |
        # Generate project files using the matrix variables
        cmake -G "Visual Studio 17 2022" -AWin32 -DBUILD_TESTS=ON -DNO_STL=${{ matrix.no_stl }} -DETL_USE_TYPE_TRAITS_BUILTINS=OFF -DETL_USER_DEFINED_TYPE_TRAITS=OFF -DETL_FORCE_TEST_CPP03_IMPLEMENTATION=${{ matrix.force_cpp03 }} -DETL_CXX_STANDARD=17 ./

        MSBuild.exe -version

        # Restore MSBuildCache NuGet package (from Directory.Build.props)
        MSBuild.exe .\etl.sln -t:restore

        # Build with cache enabled
        MSBuild.exe .\etl.sln /p:MSBuildCacheEnabled=true /p:MSBuildCacheLocalCacheRootPath="${{ github.workspace }}\.msbuildcache"

    - name: Run tests
      run: test/Debug/etl_tests.exe -v
