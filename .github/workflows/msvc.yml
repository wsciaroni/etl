name: msvc
on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows (NO_STL=${{ matrix.no_stl }}, CPP03=${{ matrix.force_cpp03 }})
    runs-on: windows-2022
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        no_stl: ['OFF', 'ON']
        force_cpp03: ['OFF', 'ON']

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup MSVC 32-bit Environment
      # This replaces the -AWin32 CMake flag by loading the correct compiler paths
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Setup ccache
      # This action automatically downloads ccache, wires it into GitHub Actions cache,
      # and configures it to handle MSVC quirks (like /Zi debug info).
      uses: ./.github/actions/setup-ccache
      with:
        key-suffix: nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}


    - name: Configure CMake
      uses: ./.github/actions/configure-cmake-etl-windows
      with:
        no-stl: ${{ matrix.no_stl }}
        force-cpp03: ${{ matrix.force_cpp03 }}

    - name: Build
      run: cmake --build . --parallel

    - name: Post build checks
      uses: ./.github/actions/post-build-windows
      with:
        artifact-name: msvc-failure-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}
        artifact-path: |
          test/etl_tests.exe
          CMakeCache.txt
          Testing/Temporary/LastTest.log
