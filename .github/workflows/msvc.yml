name: msvc
on:
  push:
    branches: [ master, development, pull-request/* ]
  pull_request:
    branches: [ master, development, pull-request/* ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows (NO_STL=${{ matrix.no_stl }}, CPP03=${{ matrix.force_cpp03 }})
    runs-on: windows-2022
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        no_stl: ['OFF', 'ON']
        force_cpp03: ['OFF', 'ON']

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Setup MSVC 32-bit Environment
      # This replaces the -AWin32 CMake flag by loading the correct compiler paths
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86

    - name: Setup ccache
      # This action automatically downloads ccache, wires it into GitHub Actions cache,
      # and configures it to handle MSVC quirks (like /Zi debug info).
      uses: ./.github/actions/setup-ccache
      with:
        key-suffix: nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}


    - name: Configure CMake
      run: |
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release `
          -DBUILD_TESTS=ON `
          -DNO_STL=${{ matrix.no_stl }} `
          -DETL_USE_TYPE_TRAITS_BUILTINS=OFF `
          -DETL_USER_DEFINED_TYPE_TRAITS=OFF `
          -DETL_FORCE_TEST_CPP03_IMPLEMENTATION=${{ matrix.force_cpp03 }} `
          -DETL_CXX_STANDARD=17 `
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache `
          -DCMAKE_C_COMPILER_LAUNCHER=ccache ./

    - name: Build
      run: cmake --build . --parallel

    - name: Run tests
      run: test/etl_tests.exe -v

    - name: Upload failure artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: msvc-failure-nostl${{ matrix.no_stl }}-cpp03${{ matrix.force_cpp03 }}
        path: |
          test/etl_tests.exe
          CMakeCache.txt
          Testing/Temporary/LastTest.log
        if-no-files-found: ignore
        retention-days: 14

    - name: Print ccache statistics
      run: ccache -s
